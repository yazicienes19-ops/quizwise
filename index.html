
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizWise - AI Document Quizzer</title>
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script>
        // Theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
        // Akzentfarbe
        const _ac = localStorage.getItem('accent_color');
        if (_ac) document.documentElement.style.setProperty('--primary', _ac);

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        // Claude coral/orange palette (replaces indigo throughout the app)
                        indigo: {
                            50:  '#FFF8F5',
                            100: '#FFE9DC',
                            200: '#FFD0B8',
                            300: '#FFB094',
                            400: '#F08C6A',
                            500: '#E07050',
                            600: '#D97757',
                            700: '#C25F3E',
                            800: '#A04A2C',
                            900: '#7D381C',
                            950: '#5C2610',
                        },
                        // Warm walnut neutrals matching the Editorial night palette
                        slate: {
                            50:  '#FAF7F2',
                            100: '#F4EDE0',
                            200: '#E8DCC5',
                            300: '#D5C4A5',
                            400: '#B5A07A',
                            500: '#8A7060',
                            600: '#6B5544',
                            700: '#4A3A2A',
                            800: '#2E2018',
                            900: '#1F1812',
                            950: '#100D08',
                        },
                    },
                    boxShadow: {
                        '3d-raised': '0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 10px -2px rgba(0, 0, 0, 0.03), inset 0 1px 0 0 rgba(255, 255, 255, 0.5)',
                        '3d-pressed': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.04)',
                        '3d-deep': '0 30px 60px -12px rgba(0, 0, 0, 0.15), 0 18px 36px -18px rgba(0, 0, 0, 0.2), inset 0 1px 0 0 rgba(255, 255, 255, 0.1)',
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Inter+Tight:wght@400;500;700;800;900&family=DM+Mono:wght@400;500&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main:       #F1E8D2;
            --bg-sidebar:    #E8DCC0;
            --border-color:  rgba(42,31,24,0.18);
            --border-soft:   rgba(42,31,24,0.09);
            --text-main:     #2A1F18;
            --ink:           #2A1F18;
            --ink2:          #4A3A2A;
            --mute:          #8A7A62;
            --card:          #F7EFD9;
            --primary:       #7A1F2B;
            --primary-soft:  rgba(122,31,43,0.10);
            --ochre:         #A56A1F;
            --forest:        #2F5742;
            --font-serif:    'EB Garamond', 'Times New Roman', serif;
            --font-sans:     'Inter Tight', system-ui, sans-serif;
            --font-mono:     'DM Mono', ui-monospace, monospace;
            --font-hand:     'Caveat', cursive;
            --tex:           url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0.09 0'/></filter><rect width='320' height='320' filter='url(%23n)'/></svg>");
        }
        .dark {
            --bg-main:       #1F1812;
            --bg-sidebar:    #16110C;
            --border-color:  rgba(239,227,204,0.12);
            --border-soft:   rgba(239,227,204,0.06);
            --text-main:     #EFE3CC;
            --ink:           #EFE3CC;
            --ink2:          #CDBFA6;
            --mute:          #867A66;
            --card:          #261D15;
            --primary:       #D4566A;
            --primary-soft:  rgba(212,86,106,0.16);
            --ochre:         #D49E5A;
            --forest:        #6FB89A;
            --tex:           url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.9  0 0 0 0 0.8  0 0 0 0.07 0'/></filter><rect width='320' height='320' filter='url(%23n)'/></svg>");
        }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            background-image: var(--tex),
                repeating-linear-gradient(0deg, transparent 0, transparent 31px, rgba(74,110,168,0.13) 31px, rgba(74,110,168,0.13) 32px);
            background-size: 320px 320px, 100% 32px;
            -webkit-font-smoothing: antialiased;
            color: var(--ink);
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
            padding: 0;
        }
        .dark body {
            background-image: var(--tex),
                repeating-linear-gradient(0deg, transparent 0, transparent 31px, rgba(140,170,220,0.07) 31px, rgba(140,170,220,0.07) 32px);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--primary, #D97757) 50%, transparent); border-radius: 10px; }

        /* ── Dynamic accent color palette ── */
        :root {
            --primary: #D97757;
            --p50:  color-mix(in srgb, var(--primary)  8%, white);
            --p100: color-mix(in srgb, var(--primary) 15%, white);
            --p200: color-mix(in srgb, var(--primary) 28%, white);
            --p300: color-mix(in srgb, var(--primary) 48%, white);
            --p400: color-mix(in srgb, var(--primary) 68%, white);
            --p500: color-mix(in srgb, var(--primary) 88%, #111);
            --p600: var(--primary);
            --p700: color-mix(in srgb, var(--primary) 82%, black);
            --p800: color-mix(in srgb, var(--primary) 60%, black);
            --p900: color-mix(in srgb, var(--primary) 35%, black);
            --p950: color-mix(in srgb, var(--primary) 18%, black);
        }

        /* bg */
        .bg-indigo-50   { background-color: var(--p50)  !important; }
        .bg-indigo-100  { background-color: var(--p100) !important; }
        .bg-indigo-500  { background-color: var(--p500) !important; }
        .bg-indigo-600  { background-color: var(--p600) !important; }
        .bg-indigo-700  { background-color: var(--p700) !important; }
        .bg-indigo-900  { background-color: var(--p900) !important; }
        .bg-indigo-950  { background-color: var(--p950) !important; }
        .hover\:bg-indigo-600:hover { background-color: var(--p600) !important; }

        /* text */
        .text-indigo-400 { color: var(--p400) !important; }
        .text-indigo-500 { color: var(--p500) !important; }
        .text-indigo-600 { color: var(--p600) !important; }
        .text-indigo-900 { color: var(--p900) !important; }
        .hover\:text-indigo-600:hover      { color: var(--p600) !important; }
        .dark .dark\:text-indigo-400       { color: var(--p400) !important; }
        .dark .dark\:hover\:text-indigo-400:hover { color: var(--p400) !important; }

        /* border */
        .border-indigo-100 { border-color: var(--p100) !important; }
        .border-indigo-200 { border-color: var(--p200) !important; }
        .border-indigo-300 { border-color: var(--p300) !important; }
        .border-indigo-400 { border-color: var(--p400) !important; }
        .border-indigo-500 { border-color: var(--p500) !important; }
        .border-indigo-600 { border-color: var(--p600) !important; }
        .border-indigo-800 { border-color: var(--p800) !important; }
        .border-indigo-900 { border-color: var(--p900) !important; }
        .dark .dark\:border-indigo-900 { border-color: var(--p900) !important; }

        /* ring & shadow */
        .ring-indigo-500    { --tw-ring-color: var(--p500) !important; }
        .ring-indigo-600    { --tw-ring-color: var(--p600) !important; }
        .shadow-indigo-200  { --tw-shadow-color: var(--p200) !important; }
        .shadow-indigo-900  { --tw-shadow-color: var(--p900) !important; }
    </style>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
