
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>QuizWise - AI Document Quizzer</title>
    <script>
        // Theme (vor React, verhindert FOUC)
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
        // Schriftart
        const FONT_MAP = {
            'inter':        "'Inter', system-ui, sans-serif",
            'garamond':     "'EB Garamond', Georgia, serif",
            'dm-sans':      "'DM Sans', system-ui, sans-serif",
            'lato':         "'Lato', system-ui, sans-serif",
            'nunito':       "'Nunito', system-ui, sans-serif",
            'merriweather': "'Merriweather', Georgia, serif",
        };
        const _fnt = localStorage.getItem('font_choice');
        if (_fnt && FONT_MAP[_fnt]) {
            document.documentElement.style.setProperty('--font-app', FONT_MAP[_fnt]);
        }
        // Zeilenabstand
        const _lh = localStorage.getItem('line_height');
        if (_lh) document.documentElement.style.setProperty('--line-height-app', _lh);
        // Akzentfarbe + Textlesbarkeit
        const _ac = localStorage.getItem('accent_color');
        if (_ac) {
            document.documentElement.style.setProperty('--primary', _ac);
            if (_ac.startsWith('#') && _ac.length === 7) {
                const r = parseInt(_ac.slice(1,3), 16);
                const g = parseInt(_ac.slice(3,5), 16);
                const b = parseInt(_ac.slice(5,7), 16);
                const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
                document.documentElement.style.setProperty('--primary-text', lum > 0.52 ? '#1a1a2e' : '#ffffff');
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700;800;900&family=Lato:wght@300;400;700;900&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      // Selbstheilung: Bleibt die App leer (z.B. weil ein veralteter Service
      // Worker ein Grundgerüst ausliefert, dessen JS-Dateien nicht mehr
      // existieren), einmal pro Sitzung Worker + Caches lösen und neu laden.
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) return;
        if (sessionStorage.getItem('qw_selfheal')) return;
        sessionStorage.setItem('qw_selfheal', '1');
        var done = function () { location.reload(); };
        try {
          var jobs = [];
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
              return Promise.all(rs.map(function (r) { return r.unregister(); }));
            }));
          }
          if (window.caches && caches.keys) {
            jobs.push(caches.keys().then(function (ks) {
              return Promise.all(ks.map(function (k) { return caches.delete(k); }));
            }));
          }
          Promise.all(jobs).then(done, done);
        } catch (e) { done(); }
      }, 6000);
    </script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
