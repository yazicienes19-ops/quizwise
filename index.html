
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizWise - AI Document Quizzer</title>
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script>
        // Theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
        // Schriftart
        const FONT_MAP = {
            'inter':        "'Inter', system-ui, sans-serif",
            'garamond':     "'EB Garamond', Georgia, serif",
            'dm-sans':      "'DM Sans', system-ui, sans-serif",
            'lato':         "'Lato', system-ui, sans-serif",
            'nunito':       "'Nunito', system-ui, sans-serif",
            'merriweather': "'Merriweather', Georgia, serif",
        };
        const _fnt = localStorage.getItem('font_choice');
        if (_fnt && FONT_MAP[_fnt]) {
            document.documentElement.style.setProperty('--font-app', FONT_MAP[_fnt]);
        }
        // Zeilenabstand
        const _lh = localStorage.getItem('line_height');
        if (_lh) document.documentElement.style.setProperty('--line-height-app', _lh);

        // Akzentfarbe + Textlesbarkeit
        const _ac = localStorage.getItem('accent_color');
        if (_ac) {
            document.documentElement.style.setProperty('--primary', _ac);
            if (_ac.startsWith('#') && _ac.length === 7) {
                const r = parseInt(_ac.slice(1,3), 16);
                const g = parseInt(_ac.slice(3,5), 16);
                const b = parseInt(_ac.slice(5,7), 16);
                const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
                document.documentElement.style.setProperty('--primary-text', lum > 0.52 ? '#1a1a2e' : '#ffffff');
            }
        }

        // Tailwind config — gesetzt sobald CDN fertig geladen ist
        window.addEventListener('load', function() {
          if (window.tailwind) tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        // Claude coral/orange palette (replaces indigo throughout the app)
                        indigo: {
                            50:  '#FFF8F5',
                            100: '#FFE9DC',
                            200: '#FFD0B8',
                            300: '#FFB094',
                            400: '#F08C6A',
                            500: '#E07050',
                            600: '#D97757',
                            700: '#C25F3E',
                            800: '#A04A2C',
                            900: '#7D381C',
                            950: '#5C2610',
                        },
                        // Blue-tinted neutrals for crisp white/dark-blue theme
                        slate: {
                            50:  '#F8FAFF',
                            100: '#F1F5FF',
                            200: '#E2E9F8',
                            300: '#C8D5EE',
                            400: '#8FA3C4',
                            500: '#607494',
                            600: '#475C7A',
                            700: '#2E4060',
                            800: '#1A2D4F',
                            900: '#0F1E3A',
                            950: '#080F20',
                        },
                    },
                    boxShadow: {
                        '3d-raised': '0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 10px -2px rgba(0, 0, 0, 0.03), inset 0 1px 0 0 rgba(255, 255, 255, 0.5)',
                        '3d-pressed': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.04)',
                        '3d-deep': '0 30px 60px -12px rgba(0, 0, 0, 0.15), 0 18px 36px -18px rgba(0, 0, 0, 0.2), inset 0 1px 0 0 rgba(255, 255, 255, 0.1)',
                    },
                },
            },
          };
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700;800;900&family=Lato:wght@300;400;700;900&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main:         #FFFFFF;
            --bg-sidebar:      #F8FAFF;
            --border-color:    #E2E9F8;
            --text-main:       #0F1E3A;
            --accent:          #D97757;
            --font-app:        'Inter', system-ui, sans-serif;
            --line-height-app: 1.6;
        }
        .dark {
            --bg-main:       #0B1525;
            --bg-sidebar:    #0F1E35;
            --border-color:  #1A3055;
            --text-main:     #E2ECF8;
            --accent:        #E08465;
            --primary-soft: color-mix(in srgb, var(--primary) 18%, transparent);
            --primary-soft-text: color-mix(in srgb, var(--primary) 60%, white);
        }
        body {
            font-family: var(--font-app, 'Inter', sans-serif);
            line-height: var(--line-height-app, 1.6);
            background-color: var(--bg-main);
            -webkit-font-smoothing: antialiased;
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
            padding: 0;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--primary, #D97757) 50%, transparent); border-radius: 10px; }

        /* ── Dynamic accent color palette ── */
        :root {
            --primary:      #D97757;
            --primary-text: #ffffff; /* dark or light text on primary bg — computed at runtime */
            --primary-soft: color-mix(in srgb, var(--primary) 12%, white);
            --primary-soft-text: color-mix(in srgb, var(--primary) 85%, #2d0f06);
            --p50:  color-mix(in srgb, var(--primary)  8%, white);
            --p100: color-mix(in srgb, var(--primary) 15%, white);
            --p200: color-mix(in srgb, var(--primary) 28%, white);
            --p300: color-mix(in srgb, var(--primary) 48%, white);
            --p400: color-mix(in srgb, var(--primary) 68%, white);
            --p500: color-mix(in srgb, var(--primary) 88%, #111);
            --p600: var(--primary);
            --p700: color-mix(in srgb, var(--primary) 82%, black);
            --p800: color-mix(in srgb, var(--primary) 60%, black);
            --p900: color-mix(in srgb, var(--primary) 35%, black);
            --p950: color-mix(in srgb, var(--primary) 18%, black);
        }

        /* ── bg solid ── */
        .bg-indigo-50   { background-color: var(--p50)  !important; }
        .bg-indigo-100  { background-color: var(--p100) !important; }
        .bg-indigo-200  { background-color: var(--p200) !important; }
        .bg-indigo-400  { background-color: var(--p400) !important; }
        .bg-indigo-500  { background-color: var(--p500) !important; }
        .bg-indigo-600  { background-color: var(--p600) !important; }
        .bg-indigo-700  { background-color: var(--p700) !important; }
        .bg-indigo-800  { background-color: var(--p800) !important; }
        .bg-indigo-900  { background-color: var(--p900) !important; }
        .bg-indigo-950  { background-color: var(--p950) !important; }

        /* ── bg opacity variants ── */
        .bg-indigo-600\/5   { background-color: color-mix(in srgb, var(--primary)  5%, transparent) !important; }
        .bg-indigo-500\/20  { background-color: color-mix(in srgb, var(--primary) 20%, transparent) !important; }
        .bg-indigo-600\/20  { background-color: color-mix(in srgb, var(--primary) 20%, transparent) !important; }
        .bg-indigo-900\/20  { background-color: color-mix(in srgb, var(--primary) 15%, transparent) !important; }
        .bg-indigo-950\/20  { background-color: color-mix(in srgb, var(--primary) 12%, transparent) !important; }
        .bg-indigo-950\/30  { background-color: color-mix(in srgb, var(--primary) 18%, transparent) !important; }
        .bg-indigo-100\/30  { background-color: color-mix(in srgb, var(--primary) 20%, transparent) !important; }

        /* ── bg dark variants ── */
        .dark .dark\:bg-indigo-900\/10 { background-color: color-mix(in srgb, var(--primary)  8%, transparent) !important; }
        .dark .dark\:bg-indigo-900\/20 { background-color: color-mix(in srgb, var(--primary) 12%, transparent) !important; }
        .dark .dark\:bg-indigo-950\/20 { background-color: color-mix(in srgb, var(--primary) 10%, transparent) !important; }
        .dark .dark\:bg-indigo-950\/30 { background-color: color-mix(in srgb, var(--primary) 15%, transparent) !important; }

        /* ── bg hover ── */
        .hover\:bg-indigo-600:hover { background-color: var(--p600) !important; }
        .hover\:bg-indigo-700:hover { background-color: var(--p700) !important; }

        /* ── text ── */
        .text-indigo-300 { color: var(--p300) !important; }
        .text-indigo-400 { color: var(--p400) !important; }
        .text-indigo-500 { color: var(--p500) !important; }
        .text-indigo-600 { color: var(--p600) !important; }
        .text-indigo-700 { color: var(--p700) !important; }
        .text-indigo-900 { color: var(--p900) !important; }
        .hover\:text-indigo-600:hover             { color: var(--p600) !important; }
        .dark .dark\:text-indigo-300              { color: var(--p300) !important; }
        .dark .dark\:text-indigo-400              { color: var(--p400) !important; }
        .dark .dark\:hover\:text-indigo-400:hover { color: var(--p400) !important; }

        /* ── border solid ── */
        .border-indigo-100 { border-color: var(--p100) !important; }
        .border-indigo-200 { border-color: var(--p200) !important; }
        .border-indigo-300 { border-color: var(--p300) !important; }
        .border-indigo-400 { border-color: var(--p400) !important; }
        .border-indigo-500 { border-color: var(--p500) !important; }
        .border-indigo-600 { border-color: var(--p600) !important; }
        .border-indigo-800 { border-color: var(--p800) !important; }
        .border-indigo-900 { border-color: var(--p900) !important; }
        .border-t-indigo-600 { border-top-color: var(--p600) !important; }
        .dark .dark\:border-indigo-900 { border-color: var(--p900) !important; }

        /* ── border opacity ── */
        .dark .dark\:border-indigo-800\/50 { border-color: color-mix(in srgb, var(--p800) 50%, transparent) !important; }
        .dark .dark\:border-indigo-900\/50 { border-color: color-mix(in srgb, var(--p900) 50%, transparent) !important; }

        /* ── border hover ── */
        .hover\:border-indigo-200:hover { border-color: var(--p200) !important; }
        .hover\:border-indigo-300:hover { border-color: var(--p300) !important; }
        .hover\:border-indigo-500:hover { border-color: var(--p500) !important; }

        /* ── border focus ── */
        .focus\:border-indigo-400:focus { border-color: var(--p400) !important; }
        .focus\:border-indigo-500:focus { border-color: var(--p500) !important; }

        /* ── ring & shadow ── */
        .ring-indigo-500                  { --tw-ring-color: var(--p500) !important; }
        .ring-indigo-600                  { --tw-ring-color: var(--p600) !important; }
        .ring-indigo-500\/20              { --tw-ring-color: color-mix(in srgb, var(--primary) 20%, transparent) !important; }
        .ring-indigo-500\/30              { --tw-ring-color: color-mix(in srgb, var(--primary) 30%, transparent) !important; }
        .ring-indigo-600\/50              { --tw-ring-color: color-mix(in srgb, var(--primary) 50%, transparent) !important; }
        .focus\:ring-indigo-500:focus     { --tw-ring-color: var(--p500) !important; }
        .focus\:ring-indigo-500\/50:focus { --tw-ring-color: color-mix(in srgb, var(--primary) 50%, transparent) !important; }
        .focus\:ring-indigo-500\/30:focus { --tw-ring-color: color-mix(in srgb, var(--primary) 30%, transparent) !important; }
        .shadow-indigo-200                { --tw-shadow-color: var(--p200) !important; }
        .shadow-indigo-900                { --tw-shadow-color: var(--p900) !important; }

        /* ── Dark-mode fallbacks (Tailwind CDN lazy-render workaround) ── */
        /* CDN scannt nur das initiale DOM; lazily gerenderte Tab-Komponenten
           bekommen via MutationObserver nicht zuverlässig alle dark:-Regeln. */

        /* Slate backgrounds */
        .dark .dark\:bg-slate-600   { background-color: #475C7A; }
        .dark .dark\:bg-slate-700   { background-color: #2E4060; }
        .dark .dark\:bg-slate-800   { background-color: #1A2D4F; }
        .dark .dark\:bg-slate-900   { background-color: #0F1E3A; }
        .dark .dark\:bg-slate-800\/40 { background-color: color-mix(in srgb, #1A2D4F 40%, transparent); }
        .dark .dark\:bg-slate-800\/50 { background-color: color-mix(in srgb, #1A2D4F 50%, transparent); }
        .dark .dark\:bg-slate-800\/60 { background-color: color-mix(in srgb, #1A2D4F 60%, transparent); }
        .dark .dark\:bg-slate-900\/40 { background-color: color-mix(in srgb, #0F1E3A 40%, transparent); }
        .dark .dark\:bg-slate-900\/50 { background-color: color-mix(in srgb, #0F1E3A 50%, transparent); }
        .dark .dark\:bg-slate-900\/80 { background-color: color-mix(in srgb, #0F1E3A 80%, transparent); }
        .dark .dark\:bg-slate-900\/90 { background-color: color-mix(in srgb, #0F1E3A 90%, transparent); }
        .dark .dark\:bg-slate-900\/95 { background-color: color-mix(in srgb, #0F1E3A 95%, transparent); }

        /* Colored backgrounds */
        .dark .dark\:bg-indigo-900\/30   { background-color: color-mix(in srgb, var(--primary) 18%, transparent); }
        .dark .dark\:bg-violet-900\/20   { background-color: color-mix(in srgb, #4c1d95 20%, transparent); }
        .dark .dark\:bg-violet-900\/30   { background-color: color-mix(in srgb, #4c1d95 30%, transparent); }
        .dark .dark\:bg-blue-900\/20     { background-color: color-mix(in srgb, #1e3a8a 20%, transparent); }
        .dark .dark\:bg-blue-900\/30     { background-color: color-mix(in srgb, #1e3a8a 30%, transparent); }
        .dark .dark\:bg-blue-900\/50     { background-color: color-mix(in srgb, #1e3a8a 50%, transparent); }
        .dark .dark\:bg-emerald-900\/20  { background-color: color-mix(in srgb, #064e3b 20%, transparent); }
        .dark .dark\:bg-emerald-900\/30  { background-color: color-mix(in srgb, #064e3b 30%, transparent); }
        .dark .dark\:bg-emerald-950\/20  { background-color: color-mix(in srgb, #022c22 20%, transparent); }
        .dark .dark\:bg-emerald-950\/30  { background-color: color-mix(in srgb, #022c22 30%, transparent); }
        .dark .dark\:bg-amber-900\/20    { background-color: color-mix(in srgb, #78350f 20%, transparent); }
        .dark .dark\:bg-amber-900\/30    { background-color: color-mix(in srgb, #78350f 30%, transparent); }
        .dark .dark\:bg-amber-950\/20    { background-color: color-mix(in srgb, #451a03 20%, transparent); }
        .dark .dark\:bg-amber-950\/30    { background-color: color-mix(in srgb, #451a03 30%, transparent); }
        .dark .dark\:bg-rose-900\/20     { background-color: color-mix(in srgb, #881337 20%, transparent); }
        .dark .dark\:bg-rose-900\/30     { background-color: color-mix(in srgb, #881337 30%, transparent); }
        .dark .dark\:bg-rose-900\/50     { background-color: color-mix(in srgb, #881337 50%, transparent); }
        .dark .dark\:bg-rose-950\/20     { background-color: color-mix(in srgb, #4c0519 20%, transparent); }
        .dark .dark\:bg-rose-950\/30     { background-color: color-mix(in srgb, #4c0519 30%, transparent); }

        /* Slate text */
        .dark .dark\:text-white     { color: #ffffff; }
        .dark .dark\:text-slate-100 { color: #F1F5FF; }
        .dark .dark\:text-slate-200 { color: #E2E9F8; }
        .dark .dark\:text-slate-300 { color: #C8D5EE; }
        .dark .dark\:text-slate-400 { color: #8FA3C4; }
        .dark .dark\:text-slate-500 { color: #607494; }
        .dark .dark\:text-slate-600 { color: #475C7A; }
        .dark .dark\:text-slate-700 { color: #2E4060; }
        .dark .dark\:text-slate-800 { color: #1A2D4F; }

        /* Colored text */
        .dark .dark\:text-indigo-100  { color: color-mix(in srgb, var(--primary) 15%, white); }
        .dark .dark\:text-indigo-200  { color: color-mix(in srgb, var(--primary) 28%, white); }
        .dark .dark\:text-violet-100  { color: #ede9fe; }
        .dark .dark\:text-violet-300  { color: #c4b5fd; }
        .dark .dark\:text-blue-300    { color: #93c5fd; }
        .dark .dark\:text-blue-400    { color: #60a5fa; }
        .dark .dark\:text-emerald-300 { color: #6ee7b7; }
        .dark .dark\:text-emerald-400 { color: #34d399; }
        .dark .dark\:text-amber-300   { color: #fcd34d; }
        .dark .dark\:text-amber-400   { color: #fbbf24; }
        .dark .dark\:text-rose-300    { color: #fda4af; }
        .dark .dark\:text-rose-400    { color: #fb7185; }

        /* Slate borders */
        .dark .dark\:border-slate-100    { border-color: #F1F5FF; }
        .dark .dark\:border-slate-600    { border-color: #475C7A; }
        .dark .dark\:border-slate-700    { border-color: #2E4060; }
        .dark .dark\:border-slate-800    { border-color: #1A2D4F; }
        .dark .dark\:border-slate-800\/50 { border-color: color-mix(in srgb, #1A2D4F 50%, transparent); }

        /* Colored borders */
        .dark .dark\:border-indigo-600      { border-color: var(--primary); }
        .dark .dark\:border-indigo-800      { border-color: color-mix(in srgb, var(--primary) 60%, black); }
        .dark .dark\:border-violet-800      { border-color: #5b21b6; }
        .dark .dark\:border-blue-800        { border-color: #1e40af; }
        .dark .dark\:border-emerald-800     { border-color: #065f46; }
        .dark .dark\:border-emerald-900\/30 { border-color: color-mix(in srgb, #064e3b 30%, transparent); }
        .dark .dark\:border-amber-800       { border-color: #92400e; }
        .dark .dark\:border-amber-900\/30   { border-color: color-mix(in srgb, #78350f 30%, transparent); }
        .dark .dark\:border-rose-800        { border-color: #9f1239; }
        .dark .dark\:border-rose-900\/30    { border-color: color-mix(in srgb, #881337 30%, transparent); }
        .dark .dark\:border-rose-900\/40    { border-color: color-mix(in srgb, #881337 40%, transparent); }

        /* Divide */
        .dark .dark\:divide-slate-800 > :not([hidden]) ~ :not([hidden]) { border-color: #1A2D4F; }

        /* Hover */
        .dark .dark\:hover\:bg-slate-700:hover       { background-color: #2E4060; }
        .dark .dark\:hover\:bg-slate-800:hover        { background-color: #1A2D4F; }
        .dark .dark\:hover\:bg-slate-800\/30:hover    { background-color: color-mix(in srgb, #1A2D4F 30%, transparent); }
        .dark .dark\:hover\:bg-slate-800\/50:hover    { background-color: color-mix(in srgb, #1A2D4F 50%, transparent); }
        .dark .dark\:hover\:bg-slate-900:hover        { background-color: #0F1E3A; }
        .dark .dark\:hover\:bg-slate-900\/50:hover    { background-color: color-mix(in srgb, #0F1E3A 50%, transparent); }
        .dark .dark\:hover\:bg-amber-950\/20:hover    { background-color: color-mix(in srgb, #451a03 20%, transparent); }
        .dark .dark\:hover\:bg-rose-900\/20:hover     { background-color: color-mix(in srgb, #881337 20%, transparent); }
        .dark .dark\:hover\:bg-rose-950\/20:hover     { background-color: color-mix(in srgb, #4c0519 20%, transparent); }
        .dark .dark\:hover\:text-slate-200:hover      { color: #E2E9F8; }
        .dark .dark\:hover\:text-slate-300:hover      { color: #C8D5EE; }
        .dark .dark\:hover\:text-white:hover          { color: #ffffff; }

        /* Group-hover */
        .dark .group:hover .dark\:group-hover\:text-white { color: #ffffff; }

        /* ── Animation keyframe fallbacks (CDN doesn't reliably generate these for dynamic elements) ── */
        @keyframes spin  { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .animate-spin  { animation: spin  1s linear infinite; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        .animate-fade-in { animation: fadeIn 0.5s ease both; }

        /* Gradients */
        .dark .dark\:from-slate-950 {
            --tw-gradient-from: #080F20;
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgb(8 15 32 / 0));
        }
        .dark .dark\:from-indigo-900\/20 {
            --tw-gradient-from: color-mix(in srgb, var(--p900) 20%, transparent);
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, transparent);
        }
        .dark .dark\:to-violet-900\/20 {
            --tw-gradient-to: color-mix(in srgb, #4c1d95 20%, transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
